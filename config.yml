# Configuration for the automated paper discovery pipeline

discovery:
  # Email used for polite-pool access (OpenAlex, Unpaywall) — no key needed, just for rate limit
  email: "auto-update@users.noreply.github.com"
  # How many days back to look for new papers
  date_window_days: 90
  # Max raw results to retrieve per search term per source (before filtering)
  max_raw_results_per_term: 25

sources:
  openalex: true
  europepmc: true
  pubmed: true
  arxiv: true
  biorxiv: true
  # crossref is used only for DOI normalization/dedup, not primary discovery
  crossref: false

categories:
  dna_methylation:
    slug: dna-methylation
    readme_marker: DNA_METHYLATION
    boundary: >
      Array-based (450K/EPIC) or sequencing-based (WGBS/RRBS/bisulfite) DNA methylation
      analysis on bulk tissue, single cells, or organoids — including aging clocks,
      epigenetic biomarkers, and methylation imputation. The input must be methylation
      profiles from solid tissue or cultured cells, NOT cell-free DNA from blood/plasma.
      Papers whose primary application is cfDNA-based non-invasive cancer detection belong
      in liquid-biopsy, even if they use methylation signals.
    search_terms:
      - "DNA methylation machine learning"
      - "DNA methylation deep learning"
      - "CpG methylation prediction neural network"
      - "bisulfite sequencing deep learning"
      - "methylome transformer foundation model"
    keywords:
      - methylation
      - CpG
      - bisulfite
      - methylome
      - WGBS
      - RRBS
      - EPIC
      - 450K
      - DMR
      - differentially methylated
    max_new_per_run: 5
    relevance_threshold: 0.65
    preprint_threshold: 0.80

  histone_modifications:
    slug: histone-modifications
    readme_marker: HISTONE_MODIFICATIONS
    boundary: >
      Prediction, profiling, or analysis of histone post-translational modifications
      (H3K4me3, H3K27ac, H3K27me3, etc.) using ML/DL, typically from ChIP-seq or
      CUT&TAG data. Does NOT include general chromatin-accessibility studies (ATAC-seq
      without histone marks) — those belong in chromatin-accessibility.
    search_terms:
      - "histone modification deep learning"
      - "histone modification machine learning"
      - "chromatin mark prediction neural network"
      - "ChIP-seq deep learning"
    keywords:
      - histone
      - H3K4
      - H3K27
      - H3K36
      - H3K9
      - chromatin mark
      - ChIP-seq
      - histone modification
    max_new_per_run: 5
    relevance_threshold: 0.65
    preprint_threshold: 0.80

  chromatin_accessibility:
    slug: chromatin-accessibility
    readme_marker: CHROMATIN_ACCESSIBILITY
    boundary: >
      ML/DL models for open-chromatin profiling (ATAC-seq, DNase-seq, scATAC-seq),
      enhancer/promoter activity prediction, or 3D genome organisation (Hi-C, TADs,
      chromatin loops). Does NOT include histone-mark ChIP-seq (→ histone-modifications)
      or cfDNA fragmentomics (→ liquid-biopsy).
    search_terms:
      - "chromatin accessibility machine learning"
      - "ATAC-seq deep learning"
      - "chromatin interaction prediction neural network"
      - "enhancer prediction deep learning"
      - "3D chromatin deep learning"
    keywords:
      - ATAC-seq
      - chromatin accessibility
      - open chromatin
      - DNase-seq
      - enhancer
      - 3D chromatin
      - TAD
      - Hi-C
      - scATAC
    max_new_per_run: 5
    relevance_threshold: 0.65
    preprint_threshold: 0.80

  multi_omics:
    slug: multi-omics
    readme_marker: MULTI_OMICS
    boundary: >
      Joint analysis or integration of two or more epigenomic modalities (e.g. scRNA +
      scATAC, methylome + transcriptome), gene regulatory network inference, or
      single-cell multi-omics. Papers that study a single modality in isolation belong
      in the modality-specific category even if multiple omics datasets are mentioned
      peripherally.
    search_terms:
      - "multi-omics integration deep learning epigenetics"
      - "single-cell epigenomics machine learning"
      - "gene regulatory network machine learning"
      - "scRNA-seq scATAC-seq integration deep learning"
    keywords:
      - multi-omics
      - scATAC
      - scRNA
      - multiome
      - regulatory network
      - single-cell epigenomics
      - SCENIC
      - MOFA
      - joint embedding
    max_new_per_run: 5
    relevance_threshold: 0.65
    preprint_threshold: 0.80

  liquid_biopsy:
    slug: liquid-biopsy
    readme_marker: LIQUID_BIOPSY
    boundary: >
      ML/DL applied to cell-free DNA (cfDNA) or circulating tumor DNA (ctDNA) from
      blood, plasma, urine, or other liquid samples for non-invasive clinical tasks
      (cancer detection, tissue-of-origin, monitoring, fragmentomics). The defining
      feature is the cell-free / liquid-sample origin — the signal may be methylation,
      fragment size, end-motifs, or copy-number variation. Papers using methylation on
      solid-tissue or array samples belong in dna-methylation, not here.
    search_terms:
      - "cell-free DNA machine learning methylation"
      - "cfDNA deep learning cancer detection"
      - "liquid biopsy epigenetics neural network"
      - "circulating tumor DNA machine learning"
      - "plasma DNA methylation deep learning"
    keywords:
      - cell-free DNA
      - cfDNA
      - liquid biopsy
      - ctDNA
      - plasma DNA
      - circulating DNA
      - cancer detection
      - end-motif
      - fragment size
      - tissue deconvolution
    max_new_per_run: 5
    relevance_threshold: 0.65
    preprint_threshold: 0.80

  novel_assays:
    slug: novel-assays
    readme_marker: NOVEL_ASSAYS
    boundary: >
      Papers that introduce or benchmark a new epigenetic measurement technology or
      protocol (e.g. TAPS, EM-seq, scNMT-seq, CUT&RUN). The novelty must be in the
      assay/sequencing chemistry itself. Papers that merely apply an existing assay with
      a new ML model belong in the modality-specific category (dna-methylation,
      histone-modifications, etc.).
    search_terms:
      - "novel epigenetic sequencing method machine learning"
      - "DNA methylation assay new technology"
      - "TAPS sequencing epigenetics"
      - "single-cell epigenetic sequencing multimodal"
    keywords:
      - TAPS
      - EM-seq
      - enzymatic methyl-seq
      - CUT&RUN
      - CUT&TAG
      - scNMT
      - novel assay
      - epigenetic profiling
      - multimodal sequencing
    max_new_per_run: 3
    relevance_threshold: 0.70
    preprint_threshold: 0.85

  datasets:
    slug: datasets
    readme_marker: DATASETS
    boundary: >
      Public databases, atlases, or curated benchmark collections of epigenomic data
      (e.g. ENCODE, Roadmap Epigenomics, GEO methylation atlases). The primary
      contribution must be the data resource itself, not a model trained on it.
    search_terms:
      - "epigenomics database resource methylation benchmark"
      - "epigenetics atlas multi-tissue dataset"
    keywords:
      - database
      - atlas
      - benchmark
      - resource
      - repository
      - ENCODE
      - epigenomics
    max_new_per_run: 2
    relevance_threshold: 0.75
    preprint_threshold: 0.90

quality:
  # Global minimum relevance score (per-category settings override this)
  min_relevance_score: 0.60
  # Require both rule-based AND LLM to agree for auto-include (2-voter rule)
  ensemble_agreement_required: true

llm:
  # GitHub Models — uses GITHUB_TOKEN, no personal key needed
  model: "gpt-4o-mini"
  # Max candidates sent to LLM for Stage-1 abstract screening per run
  max_llm_candidates_per_run: 30
  # Max papers sent for Stage-2 full-text deep review per day
  max_deep_reviews_per_day: 6
  # Max LLM calls per paper for deep review (section extraction + judgement)
  max_calls_per_paper: 4
  # Enable full-text deep review (Stage 2) — requires OA full text
  deep_review_enabled: true
  # Try to find a free/preprint version of paywalled papers before giving up
  oa_version_discovery: true
  # Abstract token budget per prompt (rough chars = tokens * 4)
  max_abstract_tokens: 800
  # Section snippet token budget for deep review
  max_section_tokens: 1500

sharding:
  # Process one category per workflow run to stay within daily LLM quota
  strategy: "single"
  # Maximum open auto-update PRs at any time (prevents PR spam)
  max_open_auto_prs: 4

pr:
  auto_update_label: "auto-update"
  needs_human_review_label: "needs-human-review"
  base_branch: "main"
