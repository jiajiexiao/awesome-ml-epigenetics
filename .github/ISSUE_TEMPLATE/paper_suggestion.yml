name: Paper / Resource Suggestion
description: Suggest a paper or resource to add to the awesome list
title: "[Paper] "
labels: ["paper-suggestion"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a paper! Fill in the fields below and the bot will
        automatically validate the URL, check for duplicates, and post a
        ready-to-use formatted entry.

  - type: input
    id: url
    attributes:
      label: URL / DOI
      description: Prefer a DOI URL (`https://doi.org/...`) when available.
      placeholder: "https://doi.org/10.xxxx/xxxxx"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Paper Title
      placeholder: "Exact title as it appears in the paper"
    validations:
      required: true

  - type: input
    id: year
    attributes:
      label: Publication Year
      placeholder: "2024"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which section of the list does this belong to?
      options:
        - DNA Methylation
        - Histone Modifications
        - Chromatin Accessibility
        - Multi-omics Integration
        - Liquid Biopsy
        - Novel Epigenetic Assays
        - Datasets
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description (optional)
      description: >
        One sentence describing the specific ML method and contribution.
        Name the exact architecture (e.g. "BERT-based encoder", "XGBoost
        classifier") and the precise task. Leave blank and the bot will
        suggest one based on the title.
      placeholder: "Transformer encoder for cfDNA fragment-level cancer classification achieving AUC 0.94."

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched the README and this paper is not already listed
          required: true
        - label: ML/DL is the core method (not just mentioned in passing)
          required: true
        - label: The paper is directly about epigenetics
          required: true
