name: Paper / Resource Suggestion
description: Suggest a paper or resource to add to the awesome list
title: "[Paper] "
labels: ["paper-suggestion"]

body:
  - type: markdown
    attributes:
      value: |
        Paste a few URLs or titles and submit.
        The bot will try to resolve metadata automatically (title/year/URL),
        validate links, check duplicates, and suggest ready-to-copy README entries.

  - type: textarea
    id: items
    attributes:
      label: URLs and/or Titles
      description: One item per line. You can mix DOI URLs, paper URLs, and plain titles.
      placeholder: |
        https://doi.org/10.1038/s41467-025-55920-z
        https://www.biorxiv.org/content/10.1101/2024.10.24.619766v1
        Epigenetic Instability-Based Metrics in Cell-Free DNA for Early Cancer Detection
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Optional. If unknown, choose "Unsure" and the bot will suggest one.
      options:
        - Unsure
        - DNA Methylation
        - Histone Modifications
        - Chromatin Accessibility
        - Multi-omics Integration
        - Liquid Biopsy
        - Novel Epigenetic Assays
        - Datasets

  - type: textarea
    id: notes
    attributes:
      label: Notes (optional)
      description: >
        Optional hints for the bot, such as model type (e.g. XGBoost, Transformer),
        category hints, or why the paper is important.
      placeholder: "The first paper uses cfDNA fragmentomics + XGBoost; likely Liquid Biopsy."

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched the README and these papers are not already listed
          required: true
        - label: The suggestions are relevant to ML in epigenetics
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        **What happens next**
        - On submit — and whenever you **edit** this issue — the bot automatically
          resolves metadata, auto-assigns a category, writes a grounded description,
          and opens a pull request that **closes this issue when it merges**.
        - Trusted issue submissions **auto-merge once all checks pass**. If the
          issue was opened by an external account, the bot adds
          `needs-human-review` and a maintainer has to approve or merge it
          manually even when the checks pass.
        - To make the bot reprocess from a **comment** (e.g. to add more papers or
          retry one that failed), start your comment with **`/triage`** followed by
          the URLs/titles. Comments without `/triage` are ignored by the bot.
