name: Review gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'README.md'

# UNPRIVILEGED: no PR_PAT, no merge rights.
# This job only reads and reports — it does not modify the repo.
permissions:
  contents: read
  issues: write
  pull-requests: write
  models: read
  statuses: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI_REPORT_FILE: /tmp/ci_report.md

    steps:
      - name: Checkout PR head (static analysis only — never execute PR code)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Fetch base branch for dedup baseline
        run: git fetch origin main

      - name: Run deterministic checks (format / dedup / link reachability)
        id: det
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: uv run python -m scripts.ci_checks --check README.md
        continue-on-error: true

      - name: Run LLM grounded review (auto-update & issue PRs)
        id: llm
        if: >
          contains(github.event.pull_request.labels.*.name, 'auto-update') ||
          contains(github.event.pull_request.labels.*.name, 'from-issue')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}
        run: uv run python -m scripts.ci_checks --llm-review README.md
        continue-on-error: true

      - name: Report result to PR and originating issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const detPass = '${{ steps.det.outcome }}' === 'success';
            const llmOutcome = '${{ steps.llm.outcome }}';
            const llmPass = llmOutcome === 'success' || llmOutcome === 'skipped';
            const allPass = detPass && llmPass;
            const icon = allPass ? '✅' : '❌';
            const llmLabel = llmOutcome === 'skipped'
              ? '⏭ Skipped (human PR — manual merge required)'
              : (llmPass ? '✅ Pass' : '❌ Fail (PR left open for human review)');

            let details = '';
            try { details = fs.readFileSync(process.env.CI_REPORT_FILE, 'utf8').trim(); } catch (e) {}
            const runUrl = `${context.serverUrl}/${context.repo.owner}/`
              + `${context.repo.repo}/actions/runs/${context.runId}`;

            // Shared body: status table + concrete hints on failure.
            const table = [
              '| Check | Result |',
              '|---|---|',
              `| Format / dedup / link reachability | ${detPass ? '✅ Pass' : '❌ Fail'} |`,
              `| LLM grounded review | ${llmLabel} |`,
            ];
            const hints = allPass
              ? ['_All checks passed. Auto-merge will trigger for trusted auto-update or issue-suggestion PRs._']
              : [
                  '### 🔍 What to review before merging',
                  '',
                  details || `_One or more checks failed — see the [run log](${runUrl}) for details._`,
                  '',
                  'Fix the entry on this branch (or comment `/triage` on the issue with '
                    + 'a correction) and the gate re-runs automatically.',
                ];

            // ── Upsert the PR comment (no duplicates on re-runs) ──
            const prNum = context.issue.number;
            const prBody = [
              '<!-- bot:review-gate-pr -->',
              `## Review Gate ${icon}`, '', ...table, '', ...hints,
            ].join('\n');
            const { data: prComments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNum,
            });
            const prBot = prComments.find(
              c => c.user.type === 'Bot' && c.body.includes('<!-- bot:review-gate-pr -->')
            );
            if (prBot) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: prBot.id, body: prBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: prNum, body: prBody,
              });
            }

            // ── Mirror the result back to the originating issue (from-issue PRs) ──
            const headRef = context.payload.pull_request.head.ref;
            const m = headRef.match(/^issue-suggestion\/(\d+)$/);
            if (!m) return;
            const issueNum = parseInt(m[1]);
            const prUrl = context.payload.pull_request.html_url;
            const verdict = allPass
              ? `✅ **Checks passed** on [PR #${prNum}](${prUrl}) — it will auto-merge and close this issue.`
              : `❌ **Checks need attention** on [PR #${prNum}](${prUrl}) — it stays open until resolved.`;
            const issueBody = [
              '<!-- bot:review-gate -->',
              `## Review gate ${icon}`, '', verdict, '',
              ...(allPass ? [] : ['### 🔍 What to review', '', details || `_See the [run log](${runUrl})._`]),
            ].join('\n');
            const { data: isComments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
            });
            const isBot = isComments.find(
              c => c.user.type === 'Bot' && c.body.includes('<!-- bot:review-gate -->')
            );
            if (isBot) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: isBot.id, body: issueBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNum, body: issueBody,
              });
            }

      - name: Fail the job if any check failed
        if: always()
        run: |
          DET="${{ steps.det.outcome }}"
          LLM="${{ steps.llm.outcome }}"
          if [ "$DET" != "success" ]; then
            echo "::error::Deterministic checks failed."
            exit 1
          fi
          if [ "$LLM" != "success" ] && [ "$LLM" != "skipped" ]; then
            echo "::error::LLM review failed or could not run."
            exit 1
          fi
