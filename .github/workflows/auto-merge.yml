name: Auto-merge approved PRs

on:
  workflow_run:
    workflows: ["Review gate"]
    types: [completed]

# Privileged — uses PR_PAT to merge.
# Only runs for auto-update branches from this repo.
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Guard at the job level before spending any API calls
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'auto-update/papers-') &&
      github.event.workflow_run.repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Find PR for this commit
        id: find_pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PR_PAT }}
          script: |
            const headSha    = context.payload.workflow_run.head_sha;
            const headBranch = context.payload.workflow_run.head_branch;

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              head:  `${context.repo.owner}:${headBranch}`,
            });

            const pr = prs.find(p => p.head.sha === headSha);
            if (!pr) {
              core.setFailed(`No open PR found for branch ${headBranch} at ${headSha}`);
              return;
            }
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_author',  pr.user.login);

      - name: Verify all trust conditions
        id: trust
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PR_PAT }}
          script: |
            const prNum     = parseInt('${{ steps.find_pr.outputs.pr_number }}');
            const headBranch = context.payload.workflow_run.head_branch;
            const headSha    = context.payload.workflow_run.head_sha;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: prNum,
            });

            // 1. Same repository (not a fork)
            const expectedFullName = `${context.repo.owner}/${context.repo.repo}`;
            if (pr.head.repo.full_name !== expectedFullName) {
              core.setFailed(`TRUST FAIL: PR is from fork ${pr.head.repo.full_name}`);
              return;
            }

            // 2. Strict branch pattern: auto-update/papers-<run_id>-<slug>
            if (!/^auto-update\/papers-\d+-[\w-]+$/.test(headBranch)) {
              core.setFailed(`TRUST FAIL: branch '${headBranch}' does not match expected pattern`);
              return;
            }

            // 3. Has 'auto-update' label
            const labels = pr.labels.map(l => l.name);
            if (!labels.includes('auto-update')) {
              core.setFailed('TRUST FAIL: missing auto-update label');
              return;
            }

            // 4. Does NOT have 'needs-human-review' label
            if (labels.includes('needs-human-review')) {
              core.setFailed('TRUST FAIL: PR has needs-human-review — human decision required');
              return;
            }

            // 5. HEAD SHA matches (review ran on current HEAD, not a stale commit)
            if (pr.head.sha !== headSha) {
              core.setFailed(`TRUST FAIL: head SHA mismatch (gate ran on ${headSha}, PR now at ${pr.head.sha})`);
              return;
            }

            // 6. Changed files must be only README.md
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: prNum,
            });
            const unexpected = files.map(f => f.filename).filter(f => f !== 'README.md');
            if (unexpected.length > 0) {
              core.setFailed(`TRUST FAIL: unexpected changed files: ${unexpected.join(', ')}`);
              return;
            }

            // 7. All required check runs are successful
            const { data: suite } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   headSha,
            });
            const failed = suite.check_runs.filter(
              c => c.status === 'completed' && !['success', 'skipped', 'neutral'].includes(c.conclusion)
            );
            if (failed.length > 0) {
              core.setFailed(`TRUST FAIL: failing checks: ${failed.map(c => c.name).join(', ')}`);
              return;
            }

            console.log(`All trust conditions satisfied for PR #${prNum}`);
            core.setOutput('verified', 'true');

      - name: Merge PR
        if: steps.trust.outputs.verified == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PR_PAT }}
          script: |
            const prNum = parseInt('${{ steps.find_pr.outputs.pr_number }}');
            await github.rest.pulls.merge({
              owner:         context.repo.owner,
              repo:          context.repo.repo,
              pull_number:   prNum,
              merge_method:  'squash',
              commit_title:  `chore: auto-merge paper updates (PR #${prNum})`,
            });
            console.log(`PR #${prNum} merged.`);
