name: Issue triage — paper suggestion

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]

# Needs to push a branch, open PRs, comment on the issue, and call GitHub Models
permissions:
  contents: write
  issues: write
  pull-requests: write
  models: read

jobs:
  triage:
    if: |
      contains(github.event.issue.labels.*.name, 'paper-suggestion') &&
      (
        github.event_name == 'issues' ||
        contains(github.event.comment.body, '/triage')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      COMMENT_FILE: /tmp/triage_comment.md
      PR_BODY_FILE: /tmp/pr_body.md

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Resolve, classify, and inject suggestions
        id: triage
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_COMMENT: ${{ github.event.comment.body || '' }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}
        run: uv run python -m scripts.issue_triage
        continue-on-error: true

      - name: Create pull request
        id: cpr
        if: steps.triage.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PR_PAT }}
          base: main
          branch: ${{ steps.triage.outputs.branch }}
          title: ${{ steps.triage.outputs.pr_title }}
          body-path: /tmp/pr_body.md
          labels: from-issue
          delete-branch: true

      - name: Post or update issue comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync(process.env.COMMENT_FILE, 'utf8');
            } catch (e) {
              body = '⚠️ Triage could not run — check the [workflow logs]('
                + `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`
                + `/actions/runs/${context.runId}).`;
            }

            const prNum = '${{ steps.cpr.outputs.pull-request-number }}';
            const prUrl = '${{ steps.cpr.outputs.pull-request-url }}';
            if (prNum) {
              body += `\n\n### 📌 Pull request opened\n`
                + `[#${prNum}](${prUrl}) — this issue will **close automatically** `
                + `when the PR is merged.`;
            }

            // Footer so each (re)run visibly refreshes the summary, even when the
            // outcome is unchanged. Reviewers can jump straight to the run log.
            const runUrl = `${context.serverUrl}/${context.repo.owner}/`
              + `${context.repo.repo}/actions/runs/${context.runId}`;
            const stamp = new Date().toISOString().replace('T', ' ').slice(0, 16) + ' UTC';
            const trigger = context.eventName === 'issue_comment'
              ? `\`/triage\` by @${context.payload.comment.user.login}`
              : 'issue update';
            body += `\n\n<sub>↻ Last triaged ${stamp} · ${trigger} · `
              + `[run log](${runUrl})</sub>`;

            // Acknowledge the triggering /triage comment inline so the author gets
            // an immediate signal right where they are looking in the thread.
            if (context.eventName === 'issue_comment' && context.payload.comment) {
              try {
                await github.rest.reactions.createForIssueComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  comment_id: context.payload.comment.id,
                  content: prNum ? 'rocket' : 'eyes',
                });
              } catch (e) { /* reactions are best-effort */ }
            }

            // Update existing bot comment rather than posting duplicates on edits
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('<!-- bot:issue-triage -->')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
