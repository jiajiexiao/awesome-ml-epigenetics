name: Issue triage — paper suggestion

on:
  issues:
    types: [opened, edited]

# Only needs to read repo content and write issue comments
permissions:
  contents: read
  issues: write

jobs:
  triage:
    if: contains(github.event.issue.labels.*.name, 'paper-suggestion')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Validate submission
        id: validate
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          PYTHONPATH: ${{ github.workspace }}
          COMMENT_FILE: /tmp/triage_comment.md
        run: uv run python -m scripts.issue_triage
        continue-on-error: true

      - name: Post or update validation comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('/tmp/triage_comment.md', 'utf8');
            } catch (e) {
              body = '⚠️ Validation could not run — check the [workflow logs]('
                + `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`
                + `/actions/runs/${context.runId}).`;
            }

            // Update existing bot comment rather than posting duplicates on edits
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('Paper Suggestion Validation')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
